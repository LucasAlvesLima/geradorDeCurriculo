<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <title>GeradorCV</title>
</head>
<body>
    <div class="container">
        <h1>Gerador de curriculo</h1>

        <div class="layout">
            <form action="">
                <h2>Dados pessoais</h2>
                <label for="nome">Nome</label><br> 
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome"><br><br>

                <label for="endereco">endereço</label><br> 
                <input type="text" id="endereco" name="endereço" placeholder="Digite seu endereco"><br><br>

                <label for="email">email</label><br> 
                <input type="email" id="email" name="email" placeholder="Digite seu email"><br><br>

                <label for="telefone">telefone</label><br> 
                <input type="number" id="telefone" name="telefone" placeholder="Digite seu telefone"><br><br>
              <div id="experiencias">
                    <h2>Experiencias proficionois</h2>
                    <label for="empresa">Empresa</label><br>
                    <input type="text" class="empresa" name="empresa"><br><br>

                    <label for="cargo">cargo</label><br>
                    <input type="text" class="cargo" name="cargo"><br><br>

                    <label for="periodo">Período</label><br>
                    <input type="text" class="periodo" name="periodo" placeholder="Ex: 2022 - 2024"><br><br>

                    <label for="descricao">Descrição</label><br>
                    <textarea class="descricao" name="descricao" rows="4"></textarea><br><br>
                    
              </div>
                    <button type="button" onclick="adicionarExperiencia()">+ Adicionar experiência</button> <br><br>


                <h2>Formação</h2>
                    <div id="formacoes">
                        <label for="curso">Curso</label><br>
                        <input type="text" class="curso" name="curso"><br><br>

                        <label for="instituicao">instituição</label><br>
                        <input type="text" class="instituicao" name="instituicao"><br><br>

                        <label for="ano">Ano de Conclusão</label><br>
                        <input type="text" class="ano" name="ano"><br><br>
                    </div>

                    <button type="button" onclick="adicionarFormacao()">+ Adicionar formação</button> <br><br>

                        <h2>Habilidades</h2>

                        <label for="habilidades">Habilidades</label><br>
                        <input type="text" id="habilidades" name="habilidades" placeholder=" "><br><br>

                        <button type="button" onclick="gerar()">Gerar Currículo</button>
                    
                
            </form>
            
            <div class="curriculo" id="curriculo">
                <h1>Curriculo</h1>
                
                

                <h3>Dados Pessoais</h3><br><br>

                <h3 id="c-nome"></h3>
                <p id="c-endereco"></p>
                <p id="c-email"></p>
                <p id="c-telefone"></p><br><br><br>

    

                <h3>Experiência</h3>
                <div id="c-experiencia"></div>
                

                <h3>Formção</h3>
                <div id="c-educacao"></div>
                


                <h3>Habilidades</h3>
                <p id="c-habilidades"></p>
              <button onclick="baixarPDF()" class="pdfcv">Baixar PDF</button>  
            </div>
            
            
        </div>
    
    </div>
    <div id="area-pdf" style="position: absolute; left: -9999px; top: 0;"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="script/script.js" ></script>
</body>
</html>
